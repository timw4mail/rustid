[package]
name = "rustid"
version = "0.7.5"
edition = "2024"
authors = ["Timothy J. Warren <tim@timshome.page>"]
description = "A utility to identify the name and properties of the current cpu"
repository = "https://git.timshomepage.net/timw4mail/rustid.git"
license = "MIT"

[dependencies]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true

# We only need heapless for x86 builds
[target.'cfg(any(target_arch = "x86", target_arch = "x86_64"))'.dependencies]
heapless = { version = "0.9.2" }

# Only include libc for the specific build types that need it
[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))'.dependencies]
libc = { version = "0.2" }

# Windows API for MP table detection
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = ["Win32_Foundation", "Win32_System_SystemInformation", "Win32_System_Registry"] }
